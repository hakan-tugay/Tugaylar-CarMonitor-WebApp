<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarMonitor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚘</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>&#128664; CarMonitor</h1>
        <p>Track and browse car records</p>
      </div>
      <div id="user-info" class="hidden">
        <span id="username-display"></span>
        <div class="dropdown">
          <button class="hamburger-btn" onclick="toggleDropdown()">&#9776;</button>
          <div id="dropdown-menu" class="dropdown-menu hidden">
            <button id="menu-car-view" onclick="showMainView(); closeDropdown()">Car View</button>
            <button id="manage-cars-btn" onclick="toggleCarsTable(); closeDropdown()">Table View</button>
            <button id="manage-locations-btn" onclick="toggleLocationsPanel(); closeDropdown()">Manage Locations</button>
            <button id="manage-users-btn" onclick="toggleUsersPanel(); closeDropdown()">Manage Users</button>
            <hr id="admin-divider" class="dropdown-divider">
            <button onclick="logout(); closeDropdown()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Auth Section -->
  <section id="auth-section" class="hidden">
    <div class="auth-box">
      <h2 id="auth-title">Login</h2>
      <form id="auth-form">
        <div class="form-group">
          <label for="auth-username">Username</label>
          <input type="text" id="auth-username" required minlength="3">
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" required minlength="4">
        </div>
        <p id="auth-error" class="auth-error hidden"></p>
        <button type="submit" id="auth-submit">Login</button>
      </form>
    </div>
  </section>

  <!-- App Section -->
  <main id="app-section" class="hidden">
    <section id="create-section">
      <h2>Add New Car</h2>
      <form id="car-form">
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" list="locations" placeholder="Select or type location..." required>
          <datalist id="locations"></datalist>
        </div>
        <div class="form-group">
          <label for="chassis">Chassis Number</label>
          <input type="text" id="chassis" placeholder="Enter chassis number..." required>
        </div>
        <button type="submit">Add Car</button>
      </form>
    </section>
    <section id="cars-section">
      <h2>Car Records</h2>
      <div id="cars-grid"></div>
      <p id="empty-message" class="hidden">No car records yet. Add one above!</p>
    </section>
    <!-- Cars Table -->
    <section id="cars-table-section" class="hidden">
      <h2>Table View</h2>
      <div class="table-toolbar">
        <input type="text" id="cars-table-search" placeholder="Search..." oninput="filterCarsTable()">
        <button class="btn-export" onclick="exportToExcel()">Export to Excel</button>
      </div>
      <div class="table-responsive">
        <table class="cars-data-table" id="cars-data-table">
          <thead>
            <tr>
              <th onclick="sortCarsTable('date')" class="sortable">Date <span id="sort-date" class="sort-arrow"></span></th>
              <th onclick="sortCarsTable('location')" class="sortable">Location <span id="sort-location" class="sort-arrow"></span></th>
              <th onclick="sortCarsTable('chassis')" class="sortable">Chassis <span id="sort-chassis" class="sort-arrow"></span></th>
            </tr>
          </thead>
          <tbody id="cars-table-body"></tbody>
        </table>
      </div>
    </section>

    <!-- Locations Management -->
    <section id="locations-section" class="hidden">
      <h2>Manage Locations</h2>
      <div class="locations-create-box">
        <h3>Add New Location</h3>
        <form id="create-location-form">
          <div class="form-row">
            <input type="text" id="new-location-name" placeholder="Location name" required>
            <button type="submit">Add</button>
          </div>
          <p id="create-location-error" class="auth-error hidden"></p>
          <p id="create-location-success" class="success-message hidden"></p>
        </form>
      </div>
      <div id="locations-list"></div>
    </section>

    <!-- Users Management -->
    <section id="users-section" class="hidden">
      <h2>Manage Users</h2>
      <div class="users-create-box">
        <h3>Create New User</h3>
        <form id="create-user-form">
          <div class="form-row">
            <input type="text" id="new-username" placeholder="Username" required minlength="3">
            <input type="password" id="new-password" placeholder="Password" required minlength="4">
            <select id="new-role">
              <option value="editor">Editor</option>
              <option value="viewer">Viewer</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit">Create</button>
          </div>
          <p id="create-user-error" class="auth-error hidden"></p>
          <p id="create-user-success" class="success-message hidden"></p>
        </form>
      </div>
      <div id="users-list"></div>
    </section>
  </main>
  <div id="lightbox" class="hidden" onclick="closeLightbox()">
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev" onclick="lightboxPrev(event)">&#8249;</button>
    <img id="lightbox-img" src="" alt="Full size photo" onclick="event.stopPropagation()">
    <button id="lightbox-next" class="lightbox-nav lightbox-next" onclick="lightboxNext(event)">&#8250;</button>
    <span id="lightbox-counter" class="lightbox-counter"></span>
  </div>
  <script src="app.js"></script>
</body>
</html>
