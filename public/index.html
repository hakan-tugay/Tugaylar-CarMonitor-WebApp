<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarMonitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CarMonitor</h1>
    <p>Track and browse new car records</p>
  </header>
  <main>
    <section id="create-section">
      <h2>Add New Car</h2>
      <form id="car-form">
        <div class="form-group">
          <label for="location">Location</label>
          <select id="location" required>
            <option value="">Select location...</option>
            <option value="Pendik">Pendik</option>
            <option value="Yalova">Yalova</option>
          </select>
        </div>
        <button type="submit">Add Car</button>
      </form>
    </section>
    <section id="cars-section">
      <h2>Car Records</h2>
      <div id="cars-grid"></div>
      <p id="empty-message" class="hidden">No car records yet. Add one above!</p>
    </section>
  </main>
  <div id="lightbox" class="hidden" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full size photo">
  </div>
  <script src="app.js"></script>
</body>
</html>
